<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121212">
    <title>Página no encontrada | Cerrajero Santiago 24</title>
    <meta name="robots" content="noindex, nofollow"> <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="logo.svg">

    <style>
        /* Estilos específicos para la página 404 */
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #121212 70%);
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            color: var(--primary-color);
            text-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
            margin-bottom: 10px;
        }
        
        .error-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--text-light);
        }
        
        .error-text {
            font-size: 1.1rem;
            color: var(--text-gray);
            max-width: 500px;
            margin-bottom: 40px;
        }

        .error-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .error-code { font-size: 6rem; }
            .error-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <main class="error-page">
        <div class="error-icon" style="font-size: 4rem; color: #333; margin-bottom: 20px;">
            <i class="fa-solid fa-key"></i>
        </div>

        <h1 class="error-code">404</h1>
        <h2 class="error-title">Esta página está cerrada</h2>
        <p class="error-text">Lo sentimos, la dirección que buscas no existe o ha cambiado. Pero no te preocupes, ¡nosotros sí abrimos puertas!</p>

        <div class="error-actions">
            <a href="index.html" class="btn btn-primary">
                <i class="fa-solid fa-house" aria-hidden="true"></i> Volver al Inicio
            </a>
            <a href="tel:+56995914808" class="btn btn-whatsapp" style="background-color: var(--bg-card); border: 1px solid var(--text-gray);">
                <i class="fa-solid fa-phone" aria-hidden="true"></i> Llamar por Urgencia
            </a>
        </div>
    </main>

</body>
</html>
