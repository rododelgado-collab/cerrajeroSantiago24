<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121212">
    <title>Página no encontrada | Cerrajero Santiago 24</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="style.css?v=1.4">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #121212 70%);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(255, 193, 7, 0.3);
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--text-light);
        }
        .error-text {
            font-size: 1.1rem;
            color: var(--text-gray);
            max-width: 500px;
            margin-bottom: 40px;
        }
        .error-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        @media (max-width: 768px) {
            .error-code { font-size: 6rem; }
            .error-title { font-size: 1.5rem; }
        }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G20KMVD7XE"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-G20KMVD7XE');</script>
</head>
<body>
    <main class="error-page">
        <div style="font-size: 4rem; color: #333; margin-bottom: 20px;">
            <i class="fa-solid fa-key"></i>
        </div>
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Esta página está cerrada</h2>
        <p class="error-text">Lo sentimos, la dirección que buscas no existe o ha cambiado. ¡Nosotros sí abrimos puertas!</p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <i class="fa-solid fa-house" aria-hidden="true"></i> Volver al Inicio
            </a>
            <a href="tel:+56935925112" class="btn btn-whatsapp">
                <i class="fa-solid fa-phone" aria-hidden="true"></i> Llamar por Urgencia
            </a>
        </div>
    </main>
    <script src="script.js?v=1.2" defer></script>
</body>
</html>
